<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>2026 NHL Playoffs</title>

<style>
body { background:#0a0e1a; color:white; font-family:Arial; padding:20px; }
.tab { display:inline-block; margin-right:10px; cursor:pointer; }
.view { display:none; margin-top:20px; }
.view.active { display:block; }

.card {
  padding:12px;
  margin:8px 0;
  border:1px solid #333;
  border-radius:8px;
}

.gold { border-color:gold; }
.silver { border-color:silver; }
.bronze { border-color:#cd7f32; }
</style>
</head>

<body>

<h1>🏒 2026 NHL PLAYOFFS</h1>

<div>
  <span class="tab" onclick="showTab('leaderboard')">🏆 Leaderboard</span>
  <span class="tab" onclick="showTab('odds')">📊 Pool Odds</span>
</div>

<div id="leaderboard" class="view active"></div>
<div id="odds" class="view"></div>

<script>

// ---------------- PLAYERS ----------------
const PLAYERS = [
  {name:'Matt', cup:'Colorado'},
  {name:'AJ', cup:'Edmonton'},
  {name:'Ced', cup:'Edmonton'},
  {name:'Eric', cup:'Colorado'},
  {name:'Jason', cup:'Montreal'}
];

// ---------------- FETCH + CLEAN ODDS ----------------
async function fetchOdds(){
  try {
    const res = await fetch('odds.json');
    const data = await res.json();

    const cleaned = {};

    // 🔥 adapt to MoneyPuck structure
    if(data && data.teams){
      data.teams.forEach(t=>{
        cleaned[t.name] = t.cupOdds || 0.05;
      });
    }

    return cleaned;

  } catch(e){
    console.log("Odds failed, using fallback");

    return {
      "Colorado":0.18,
      "Edmonton":0.06,
      "Carolina":0.12,
      "Dallas":0.11,
      "Vegas":0.09,
      "Boston":0.08,
      "Pittsburgh":0.06,
      "Montreal":0.05
    };
  }
}

// ---------------- PROBABILITY ----------------
function getProb(a,b,odds){
  const x = odds[a] || 0.05;
  const y = odds[b] || 0.05;
  return x/(x+y);
}

// ---------------- SIMULATE BRACKET ----------------
function simulate(odds){
  const teams = Object.keys(odds);

  function pick(a,b){
    return Math.random() < getProb(a,b,odds) ? a : b;
  }

  let round = [...teams];

  while(round.length > 1){
    let next = [];
    for(let i=0;i<round.length;i+=2){
      if(round[i+1]){
        next.push(pick(round[i], round[i+1]));
      }
    }
    round = next;
  }

  return round[0];
}

// ---------------- MAIN SIM ----------------
async function runSim(){

  const odds = await fetchOdds();

  const results = {};
  PLAYERS.forEach(p => results[p.name]=0);

  const sims = 5000;

  for(let i=0;i<sims;i++){

    const cupWinner = simulate(odds);

    let best = -1;
    let winners = [];

    PLAYERS.forEach(p=>{
      let score = (p.cup === cupWinner) ? 5 : 0;

      if(score > best){
        best = score;
        winners = [p.name];
      } else if(score === best){
        winners.push(p.name);
      }
    });

    winners.forEach(w=>{
      results[w] += 1 / winners.length;
    });
  }

  // convert to %
  Object.keys(results).forEach(k=>{
    results[k] = (results[k] / sims * 100);
  });

  render(results);
}

// ---------------- RENDER ----------------
function render(results){

  const sorted = Object.entries(results)
    .sort((a,b)=>b[1]-a[1]);

  // leaderboard (medals based on projection)
  let lb = "<h2>🏆 Leaderboard (Projected)</h2>";

  sorted.forEach(([name,val],i)=>{

    let medal="";
    let cls="card";

    if(i===0){ medal="🥇"; cls+=" gold"; }
    else if(i===1){ medal="🥈"; cls+=" silver"; }
    else if(i===2){ medal="🥉"; cls+=" bronze"; }

    const player = PLAYERS.find(p=>p.name===name);

    lb += `
      <div class="${cls}">
        ${medal} <b>${name}</b><br>
        Cup Pick: ${player.cup}<br>
        Win Chance: ${val.toFixed(1)}%
      </div>
    `;
  });

  document.getElementById('leaderboard').innerHTML = lb;

  // odds tab
  let oddsHtml = "<h2>📊 Pool Odds</h2>";

  sorted.forEach(([name,val])=>{
    oddsHtml += `<div>${name}: ${val.toFixed(1)}%</div>`;
  });

  document.getElementById('odds').innerHTML = oddsHtml;
}

// ---------------- UI ----------------
function showTab(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ---------------- INIT ----------------
runSim();

</script>

</body>
</html>
