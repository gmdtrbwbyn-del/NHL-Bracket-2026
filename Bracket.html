<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 NHL Playoffs — The Boys</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --dark: #0a0e1a;
    --navy: #0d1b3e;
    --blue: #1a4fd6;
    --gold: #f5a623;
    --silver: #8a9bb5;
    --card: #111827;
    --border: #1e2d4a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); color: #e2e8f0; font-family: 'Inter', sans-serif; min-height: 100vh; }
  header { background: linear-gradient(135deg, #0a0e1a 0%, #0d1b3e 50%, #0a0e1a 100%); border-bottom: 2px solid var(--blue); padding: 20px 24px 14px; text-align: center; position: relative; overflow: hidden; }
  header::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(26,79,214,0.04) 60px, rgba(26,79,214,0.04) 61px); }
  header h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2rem, 6vw, 3.5rem); letter-spacing: 0.08em; color: #fff; text-shadow: 0 0 40px rgba(26,79,214,0.6); position: relative; }
  header p { color: var(--silver); font-size: 0.8rem; margin-top: 4px; letter-spacing: 0.12em; text-transform: uppercase; position: relative; }
  .sync-bar { background: #080c18; border-bottom: 1px solid var(--border); padding: 7px 16px; display: flex; align-items: center; justify-content: space-between; font-size: 0.74rem; color: var(--silver); }
  .sync-left { display: flex; align-items: center; gap: 8px; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #64748b; flex-shrink: 0; transition: background 0.3s; }
  .sync-dot.live { background: #22c55e; box-shadow: 0 0 6px #22c55e; animation: pulse 2s infinite; }
  .sync-dot.loading { background: var(--gold); animation: pulse 0.6s infinite; }
  .sync-dot.error { background: #ef4444; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .tabs { display: flex; gap: 4px; padding: 14px 14px 0; background: #0a0e1a; border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { padding: 9px 18px; border-radius: 8px 8px 0 0; cursor: pointer; font-size: 0.82rem; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: var(--silver); background: var(--card); border: 1px solid var(--border); border-bottom: none; white-space: nowrap; transition: all 0.2s; }
  .tab:hover { color: #fff; background: #1a2540; }
  .tab.active { color: #fff; background: var(--navy); border-color: var(--blue); }
  .view { display: none; padding: 18px 14px; max-width: 860px; margin: 0 auto; }
  .view.active { display: block; }
  .leaderboard { display: flex; flex-direction: column; gap: 10px; }
  .player-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; display: flex; align-items: center; gap: 14px; transition: transform 0.15s; }
  .player-card:hover { transform: translateX(3px); }
  .player-card.p1 { border-color: var(--gold); background: linear-gradient(135deg, #120f00, var(--card)); }
  .player-card.p2 { border-color: #9ca3af; }
  .player-card.p3 { border-color: #b45309; }
  .rank { font-family: 'Bebas Neue', sans-serif; font-size: 1.7rem; width: 34px; text-align: center; color: var(--silver); }
  .p1 .rank { color: var(--gold); }
  .player-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.35rem; letter-spacing: 0.04em; flex: 1; }
  .score-box { text-align: right; }
  .total-score { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--blue); line-height: 1; }
  .p1 .total-score { color: var(--gold); }
  .score-label { font-size: 0.68rem; color: var(--silver); text-transform: uppercase; letter-spacing: 0.08em; }
  .score-breakdown { display: flex; gap: 6px; margin-top: 7px; flex-wrap: wrap; align-items: center; }
  .score-pill { font-size: 0.7rem; padding: 2px 7px; border-radius: 20px; background: #1a2540; color: #94a3b8; }
  .cup-pick { font-size: 0.7rem; padding: 2px 9px; border-radius: 20px; font-weight: 700; background: rgba(245,166,35,0.12); color: var(--gold); border: 1px solid rgba(245,166,35,0.25); }
  .cup-pick.correct { background: rgba(34,197,94,0.15); color: #4ade80; border-color: rgba(34,197,94,0.3); }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 0.08em; color: var(--silver); margin: 18px 0 10px; padding-bottom: 7px; border-bottom: 1px solid var(--border); }
  .series-grid { display: flex; flex-direction: column; gap: 7px; }
  .series-row { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 11px 15px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .series-row.done { border-color: rgba(34,197,94,0.25); }
  .series-matchup { font-size: 0.82rem; font-weight: 600; flex: 1; color: #cbd5e1; min-width: 160px; }
  .series-winner { font-size: 0.75rem; font-weight: 700; padding: 3px 10px; border-radius: 6px; background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.25); }
  .series-inprogress { font-size: 0.75rem; padding: 3px 10px; border-radius: 6px; background: rgba(245,166,35,0.12); color: var(--gold); }
  .series-pending { font-size: 0.75rem; padding: 3px 10px; border-radius: 6px; background: #1a2540; color: #64748b; }
  .picks-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-bottom: 4px; }
  .picks-table th { background: var(--navy); padding: 9px 10px; text-align: left; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--silver); border-bottom: 1px solid var(--border); }
  .picks-table td { padding: 9px 10px; border-bottom: 1px solid var(--border); color: #cbd5e1; }
  .picks-table tr:hover td { background: rgba(26,79,214,0.04); }
  .pick { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 0.74rem; font-weight: 600; }
  .pick.correct { background: rgba(34,197,94,0.18); color: #4ade80; }
  .pick.wrong { background: rgba(239,68,68,0.14); color: #f87171; }
  .pick.pending { background: rgba(100,116,139,0.18); color: #94a3b8; }
  .pick.cup { background: rgba(245,166,35,0.18); color: var(--gold); font-weight: 700; }
  .pick.cup.correct { background: rgba(34,197,94,0.18); color: #4ade80; }
  .pick.cup.wrong { background: rgba(239,68,68,0.14); color: #f87171; }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 14px; font-size: 0.73rem; color: var(--silver); align-items: center; }
  .ld { display: inline-block; width: 9px; height: 9px; border-radius: 2px; margin-right: 4px; vertical-align: middle; }
  .error-banner { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 8px; padding: 10px 14px; font-size: 0.8rem; color: #fca5a5; margin-bottom: 14px; }
  .info-banner { background: rgba(26,79,214,0.1); border: 1px solid rgba(26,79,214,0.25); border-radius: 8px; padding: 10px 14px; font-size: 0.8rem; color: #93c5fd; margin-bottom: 14px; }

  .odds-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; gap: 14px; }
  .odds-card.p1 { border-color: var(--gold); background: linear-gradient(135deg, #120f00, var(--card)); }
  .odds-card.p2 { border-color: #9ca3af; }
  .odds-card.p3 { border-color: #b45309; }
  .odds-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.35rem; letter-spacing: 0.04em; }
  .odds-percent { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--gold); line-height: 1; text-align:right; }
  .odds-sub { font-size: 0.72rem; color: var(--silver); margin-top: 4px; }
  .odds-bar { height: 8px; border-radius: 999px; background: #1a2540; overflow: hidden; margin-top: 8px; max-width: 360px; }
  .odds-fill { height: 100%; background: var(--blue); border-radius: 999px; }
  @media (max-width: 480px) { .picks-table { font-size: 0.7rem; } .picks-table th, .picks-table td { padding: 7px 5px; } .player-name { font-size: 1.1rem; } }
</style>
</head>
<body>
<header>
  <h1>🏒 2026 NHL PLAYOFFS</h1>
  <p>The Boys Bracket Challenge</p>
</header>
<div class="sync-bar">
  <div class="sync-left">
    <span class="sync-dot loading" id="syncDot"></span>
    <span id="syncStatus">Loading...</span>
  </div>
  <span id="lastUpdated" style="color:#475569;font-size:0.7rem"></span>
</div>
<div class="tabs">
  <div class="tab active" onclick="showTab('leaderboard',this)">🏆 Leaderboard</div>
  <div class="tab" onclick="showTab('series',this)">🏒 Series</div>
  <div class="tab" onclick="showTab('picks',this)">🎯 All Picks</div>
  <div class="tab" onclick="showTab('poolOdds',this)">📊 Pool Odds</div>
</div>
<div id="leaderboard" class="view active"><div style="padding:40px;text-align:center;color:var(--silver)">Loading scores...</div></div>
<div id="series" class="view"></div>
<div id="picks" class="view"></div>
<div id="poolOdds" class="view"><div style="padding:40px;text-align:center;color:var(--silver)">Loading pool odds...</div></div>
<script>
const PLAYERS = [
  { name:'Matt', cup:'Colorado',
    r1:{'COL-LAK':'Colorado','DAL-MIN':'Minnesota','VGK-UTA':'Vegas','EDM-ANA':'Edmonton','BOS-BUF':'Boston','MTL-TBL':'Montreal','CAR-OTT':'Carolina','PIT-PHI':'Pittsburgh'},
    r2:['Colorado','Edmonton','Montreal','Carolina'],
    r3:['Colorado','Carolina']},
  { name:'AJ', cup:'Edmonton',
    r1:{'COL-LAK':'Colorado','DAL-MIN':'Minnesota','VGK-UTA':'Vegas','EDM-ANA':'Edmonton','BOS-BUF':'Buffalo','MTL-TBL':'Tampa Bay','CAR-OTT':'Carolina','PIT-PHI':'Pittsburgh'},
    r2:['Colorado','Edmonton','Tampa Bay','Pittsburgh'],
    r3:['Edmonton','Tampa Bay']},
  { name:'Ced', cup:'Edmonton',
    r1:{'COL-LAK':'Colorado','DAL-MIN':'Dallas','VGK-UTA':'Vegas','EDM-ANA':'Edmonton','BOS-BUF':'Boston','MTL-TBL':'Tampa Bay','CAR-OTT':'Carolina','PIT-PHI':'Pittsburgh'},
    r2:['Colorado','Edmonton','Boston','Carolina'],
    r3:['Edmonton','Carolina']},
  { name:'Eric', cup:'Colorado',
    r1:{'COL-LAK':'Colorado','DAL-MIN':'Dallas','VGK-UTA':'Vegas','EDM-ANA':'Edmonton','BOS-BUF':'Boston','MTL-TBL':'Montreal','CAR-OTT':'Carolina','PIT-PHI':'Philadelphia'},
    r2:['Colorado','Vegas','Montreal','Carolina'],
    r3:['Colorado','Carolina']},
  { name:'Jason', cup:'Montreal',
    r1:{'COL-LAK':'Colorado','DAL-MIN':'Dallas','VGK-UTA':'Vegas','EDM-ANA':'Edmonton','BOS-BUF':'Buffalo','MTL-TBL':'Montreal','CAR-OTT':'Carolina','PIT-PHI':'Pittsburgh'},
    r2:['Colorado','Edmonton','Montreal','Carolina'],
    r3:['Edmonton','Montreal']},
];
const ABBR={COL:'Colorado',LAK:'LA Kings',DAL:'Dallas',MIN:'Minnesota',VGK:'Vegas',UTA:'Utah',EDM:'Edmonton',ANA:'Anaheim',BOS:'Boston',BUF:'Buffalo',MTL:'Montreal',TBL:'Tampa Bay',CAR:'Carolina',OTT:'Ottawa',PIT:'Pittsburgh',PHI:'Philadelphia'};
const nm=c=>ABBR[c]||c;
const displayPlayerName=n=>n==='Eric'?'Eric 🍆':n;
let seriesList=[],apiError=false,poolProjection=null,oddsError=false;

// ESPN's public scoreboard endpoint works from GitHub Pages without the NHL API CORS problem.
// It does not give us a clean "bracket" object, so we build series standings from playoff games.
// Winners are marked when a team reaches 4 wins in a matchup.
const ESPN_TEAM_MAP={
  COL:'Colorado', LA:'LA Kings', LAK:'LA Kings', DAL:'Dallas', MIN:'Minnesota',
  VGK:'Vegas', VGS:'Vegas', UTAH:'Utah', UTA:'Utah', EDM:'Edmonton', ANA:'Anaheim',
  BOS:'Boston', BUF:'Buffalo', MTL:'Montreal', TB:'Tampa Bay', TBL:'Tampa Bay',
  CAR:'Carolina', OTT:'Ottawa', PIT:'Pittsburgh', PHI:'Philadelphia'
};

function canonTeam(t){
  if(!t)return '';
  const abbr=(t.abbreviation||t.abbrev||'').toUpperCase();
  if(ESPN_TEAM_MAP[abbr])return ESPN_TEAM_MAP[abbr];
  const name=t.shortDisplayName||t.displayName||t.name||abbr;
  const fixes={
    'Avalanche':'Colorado','Kings':'LA Kings','Stars':'Dallas','Wild':'Minnesota',
    'Golden Knights':'Vegas','Mammoth':'Utah','Utah Hockey Club':'Utah','Oilers':'Edmonton',
    'Ducks':'Anaheim','Bruins':'Boston','Sabres':'Buffalo','Canadiens':'Montreal',
    'Lightning':'Tampa Bay','Hurricanes':'Carolina','Senators':'Ottawa',
    'Penguins':'Pittsburgh','Flyers':'Philadelphia'
  };
  return fixes[name]||name;
}

function seriesKey(a,b){return [a,b].sort().join('|');}
function namesFromPickKey(key){return key.split('-').map(c=>nm(c));}

async function getJson(url){
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),10000);
  try{
    const r=await fetch(url,{signal:ctrl.signal,cache:'no-store'});
    if(!r.ok)throw new Error('HTTP '+r.status);
    return await r.json();
  }finally{
    clearTimeout(timer);
  }
}

async function fetchBracket(){
  setSyncStatus('loading');

  // Wide playoff window. ESPN ignores dates with no games.
  const ESPN='https://site.api.espn.com/apis/site/v2/sports/hockey/nhl/scoreboard?dates=20260415-20260630&limit=1000';

  try{
    const data=await getJson(ESPN);
    const grouped={};

    (data.events||[]).forEach(ev=>{
      const comp=ev.competitions&&ev.competitions[0];
      if(!comp||!comp.competitors||comp.competitors.length<2)return;

      // Keep playoff games when ESPN labels the season type. If season is missing, keep it.
      if(ev.season && ev.season.type && ev.season.type!==3)return;

      const completed=ev.status?.type?.completed===true;
      const date=ev.date||comp.date||'';

      const a=comp.competitors[0], b=comp.competitors[1];
      const teamA=canonTeam(a.team), teamB=canonTeam(b.team);
      if(!teamA||!teamB)return;

      const key=seriesKey(teamA,teamB);
      if(!grouped[key]){
        grouped[key]={teams:[teamA,teamB], wins:{[teamA]:0,[teamB]:0}, firstDate:date, winner:null};
      }
      if(date && (!grouped[key].firstDate || date<grouped[key].firstDate))grouped[key].firstDate=date;

      if(completed){
        const scoreA=Number(a.score||0), scoreB=Number(b.score||0);
        const winner=scoreA>scoreB?teamA:scoreB>scoreA?teamB:null;
        if(winner)grouped[key].wins[winner]=(grouped[key].wins[winner]||0)+1;
      }
    });

    const allSeries=Object.values(grouped)
      .sort((a,b)=>(a.firstDate||'').localeCompare(b.firstDate||''))
      .map((s,i)=>{
        const [t1,t2]=s.teams;
        const w1=s.wins[t1]||0, w2=s.wins[t2]||0;
        const winner=w1>=4?t1:w2>=4?t2:null;

        // Assign rounds by discovery order: first 8 series = R1, next 4 = R2, next 2 = CF, next 1 = Cup.
        let roundNum=1;
        if(i>=8 && i<12)roundNum=2;
        else if(i>=12 && i<14)roundNum=3;
        else if(i>=14)roundNum=4;

        return{roundNum,t1,t2,w1,w2,winner};
      });

    seriesList=allSeries;
    apiError=false;
    setSyncStatus('live');
    document.getElementById('lastUpdated').textContent='Updated '+new Date().toLocaleTimeString();
    renderAll();
  }catch(e){
    console.error('Score fetch failed:',e);
    apiError=true;
    setSyncStatus('error');
    renderAll();
  }
}

const seriesForRound=n=>seriesList.filter(s=>s.roundNum===n);
const winnersForRound=n=>seriesForRound(n).map(s=>s.winner).filter(Boolean);
const roundComplete=n=>{const exp=n===1?8:n===2?4:n===3?2:1;return winnersForRound(n).length===exp;};

function r1Winner(key){
  const [a,b]=namesFromPickKey(key);
  const s=seriesList.find(x=>x.roundNum===1 && seriesKey(x.t1,x.t2)===seriesKey(a,b));
  return s?.winner||null;
}

function calcScore(p){
  let total=0,b={r1:0,r2:0,r3:0,cup:0};

  // Award points as each individual series finishes — no need to wait for the whole round.
  Object.entries(p.r1).forEach(([k,pick])=>{
    if(r1Winner(k)===pick){
      total+=1;
      b.r1+=1;
    }
  });

  const r2w=winnersForRound(2);
  p.r2.forEach(pick=>{
    if(r2w.includes(pick)){
      total+=2;
      b.r2+=2;
    }
  });

  const r3w=winnersForRound(3);
  p.r3.forEach(pick=>{
    if(r3w.includes(pick)){
      total+=3;
      b.r3+=3;
    }
  });

  const cupWinner=winnersForRound(4)[0];
  if(cupWinner && p.cup===cupWinner){
    total+=5;
    b.cup+=5;
  }

  return{total,b};
}
function renderAll(){renderLeaderboard();renderSeries();renderPicks();renderPoolOdds();}
function renderLeaderboard(){
  const scored=PLAYERS.map(p=>({...p,...calcScore(p)})).sort((a,b)=>b.total-a.total);
  const medals=['🥇','🥈','🥉'],cls=['p1','p2','p3'];
  const cupWinner=winnersForRound(4)[0]||null;
  let html='<div class="leaderboard">';
  if(apiError)html+=`<div class="error-banner">⚠️ Could not reach scores API — retrying in 5 min.</div>`;
  scored.forEach((p,i)=>{
    const cc=cupWinner&&p.cup===cupWinner?'correct':'';
    html+=`<div class="player-card ${cls[i]||''}"><div class="rank">${medals[i]||(i+1)}</div><div style="flex:1"><div class="player-name">${displayPlayerName(p.name)}</div><div class="score-breakdown"><span class="score-pill">R1: ${p.b.r1}pt</span><span class="score-pill">R2: ${p.b.r2}pt</span><span class="score-pill">CF: ${p.b.r3}pt</span><span class="score-pill">Cup: ${p.b.cup}pt</span><span class="cup-pick ${cc}">🏒 ${p.cup}</span></div></div><div class="score-box"><div class="total-score">${p.total}</div><div class="score-label">pts</div></div></div>`;
  });
  html+='</div>';
  document.getElementById('leaderboard').innerHTML=html;
}
function renderSeries(){
  const rl=['Round 1 (1pt)','Round 2 (2pts)','Conference Finals (3pts)','Stanley Cup Final (5pts)'];
  let html=`<div class="info-banner">🔄 Auto-refreshes every 5 min. Points update as soon as each series has a winner.</div>`;
  [1,2,3,4].forEach(n=>{
    const list=seriesForRound(n);
    html+=`<div class="section-title">${rl[n-1]}</div><div class="series-grid">`;
    if(!list.length){html+=`<div class="series-row"><span class="series-pending">Waiting for round to begin</span></div>`;}
    else list.forEach(s=>{
      const badge=s.winner?`<span class="series-winner">✓ ${s.winner}</span>`:(s.w1||s.w2)?`<span class="series-inprogress">${s.t1} ${s.w1}–${s.w2} ${s.t2}</span>`:`<span class="series-pending">Not started</span>`;
      html+=`<div class="series-row ${s.winner?'done':''}"><div class="series-matchup">${s.t1} vs ${s.t2}</div>${badge}</div>`;
    });
    html+='</div>';
  });
  document.getElementById('series').innerHTML=html;
}
function renderPicks(){
  const R1=[['COL-LAK','Colorado vs LA Kings'],['DAL-MIN','Dallas vs Minnesota'],['VGK-UTA','Vegas vs Utah'],['EDM-ANA','Edmonton vs Anaheim'],['BOS-BUF','Boston vs Buffalo'],['MTL-TBL','Montreal vs Tampa Bay'],['CAR-OTT','Carolina vs Ottawa'],['PIT-PHI','Pittsburgh vs Philadelphia']];
  const R2L=['W Semi 1','W Semi 2','E Semi 1','E Semi 2'],R3L=['Western Final','Eastern Final'];
  const heads=`<tr><th>Series</th>${PLAYERS.map(p=>`<th>${p.name}</th>`).join('')}<th>Winner</th></tr>`;
  const ps=(pick,winners,done)=>!done?'pending':winners.includes(pick)?'correct':'wrong';
  const r1done=roundComplete(1);
  const r1rows=R1.map(([k,label])=>{const actual=r1Winner(k);const cells=PLAYERS.map(p=>{const pick=p.r1[k]||'—';const cls=!r1done?'pending':pick===actual?'correct':'wrong';return`<td><span class="pick ${cls}">${pick}</span></td>`;}).join('');return`<tr><td style="color:#64748b;font-size:0.72rem">${label}</td>${cells}<td style="color:${actual?'#4ade80':'#475569'};font-weight:600">${actual||'—'}</td></tr>`;}).join('');
  const r2w=winnersForRound(2),r2done=roundComplete(2);
  const r2rows=R2L.map((label,i)=>{const cells=PLAYERS.map(p=>{const pick=p.r2[i]||'—';return`<td><span class="pick ${ps(pick,r2w,r2done)}">${pick}</span></td>`;}).join('');const actual=r2w[i]||null;return`<tr><td style="color:#64748b;font-size:0.72rem">${label}</td>${cells}<td style="color:${actual?'#4ade80':'#475569'};font-weight:600">${actual||'—'}</td></tr>`;}).join('');
  const r3w=winnersForRound(3),r3done=roundComplete(3);
  const r3rows=R3L.map((label,i)=>{const cells=PLAYERS.map(p=>{const pick=p.r3[i]||'—';return`<td><span class="pick ${ps(pick,r3w,r3done)}">${pick}</span></td>`;}).join('');const actual=r3w[i]||null;return`<tr><td style="color:#64748b;font-size:0.72rem">${label}</td>${cells}<td style="color:${actual?'#4ade80':'#475569'};font-weight:600">${actual||'—'}</td></tr>`;}).join('');
  const cupWinner=winnersForRound(4)[0]||null,cupDone=roundComplete(4);
  const cupCells=PLAYERS.map(p=>{const cls=`cup${!cupDone?'':p.cup===cupWinner?' correct':' wrong'}`;return`<td><span class="pick ${cls}">${p.cup}</span></td>`;}).join('');
  document.getElementById('picks').innerHTML=`<div class="legend"><span><span class="ld" style="background:#4ade80"></span>Correct</span><span><span class="ld" style="background:#f87171"></span>Wrong</span><span><span class="ld" style="background:#94a3b8"></span>Pending</span><span><span class="ld" style="background:var(--gold)"></span>Cup pick</span></div><div class="section-title">Round 1 (1pt)</div><table class="picks-table"><thead>${heads}</thead><tbody>${r1rows}</tbody></table><div class="section-title">Round 2 (2pts)</div><table class="picks-table"><thead>${heads}</thead><tbody>${r2rows}</tbody></table><div class="section-title">Conference Finals (3pts)</div><table class="picks-table"><thead>${heads}</thead><tbody>${r3rows}</tbody></table><div class="section-title">Stanley Cup Final (5pts)</div><table class="picks-table"><thead>${heads}</thead><tbody><tr><td style="color:#64748b;font-size:0.72rem">Cup Winner</td>${cupCells}<td style="color:${cupWinner?'#4ade80':'#475569'};font-weight:600">${cupWinner||'—'}</td></tr></tbody></table>`;
}


// ---------------- POOL ODDS / PROJECTION TAB ----------------
// Accurate pool model: uses MoneyPuck round probabilities from odds.json,
// simulates the actual bracket path, scores every full bracket, and counts pool winners.
const TEAM_CODE={
  'Colorado':'COL','LA Kings':'LAK','Dallas':'DAL','Minnesota':'MIN','Vegas':'VGK','Utah':'UTA','Edmonton':'EDM','Anaheim':'ANA',
  'Boston':'BOS','Buffalo':'BUF','Montreal':'MTL','Tampa Bay':'TBL','Carolina':'CAR','Ottawa':'OTT','Pittsburgh':'PIT','Philadelphia':'PHI'
};
const CODE_TEAM=Object.fromEntries(Object.entries(TEAM_CODE).map(([k,v])=>[v,k]));
CODE_TEAM.LA='LA Kings'; CODE_TEAM.TB='Tampa Bay'; CODE_TEAM.VGS='Vegas'; CODE_TEAM.UTAH='Utah';

const FALLBACK_ROUND_ODDS={
  CAR:{make2:1.000,make3:0.666,makeFinal:0.371,winCup:0.208},
  COL:{make2:1.000,make3:0.574,makeFinal:0.354,winCup:0.191},
  BUF:{make2:0.902,make3:0.509,makeFinal:0.260,winCup:0.133},
  VGK:{make2:0.379,make3:0.249,makeFinal:0.123,winCup:0.065},
  MIN:{make2:0.489,make3:0.212,makeFinal:0.121,winCup:0.063},
  UTA:{make2:0.621,make3:0.340,makeFinal:0.139,winCup:0.062},
  TBL:{make2:0.564,make3:0.259,makeFinal:0.122,winCup:0.059},
  DAL:{make2:0.511,make3:0.214,makeFinal:0.117,winCup:0.055},
  PHI:{make2:0.862,make3:0.286,makeFinal:0.123,winCup:0.051},
  ANA:{make2:0.831,make3:0.329,makeFinal:0.112,winCup:0.042},
  MTL:{make2:0.436,make3:0.183,makeFinal:0.080,winCup:0.036},
  EDM:{make2:0.169,make3:0.081,makeFinal:0.034,winCup:0.015},
  LAK:{make2:0.000,make3:0.000,makeFinal:0.000,winCup:0.000},
  BOS:{make2:0.098,make3:0.030,makeFinal:0.010,winCup:0.004},
  OTT:{make2:0.000,make3:0.000,makeFinal:0.000,winCup:0.000},
  PIT:{make2:0.138,make3:0.030,makeFinal:0.010,winCup:0.004}
};

function probabilityNumber(v){
  if(v===null||v===undefined)return null;
  if(typeof v==='string')v=v.replace('%','').trim();
  const n=Number(v);
  if(!Number.isFinite(n))return null;
  return n>1?n/100:n;
}
function normalizeCode(raw){
  if(!raw)return '';
  let s=String(raw).trim().toUpperCase().replace(/[^A-Z]/g,'');
  const aliases={LA:'LAK',LOSANGELES:'LAK',LAKINGS:'LAK',TAMPA:'TBL',TAMPABAY:'TBL',TB:'TBL',VGS:'VGK',VEGAS:'VGK',UTAH:'UTA'};
  if(aliases[s])s=aliases[s];
  if(CODE_TEAM[s])return s;
  const nameMap={
    COLORADOAVALANCHE:'COL',AVALANCHE:'COL',DALLASSTARS:'DAL',STARS:'DAL',MINNESOTAWILD:'MIN',WILD:'MIN',
    VEGASGOLDENKNIGHTS:'VGK',GOLDENKNIGHTS:'VGK',UTAHMAMMOTH:'UTA',UTAHHOCKEYCLUB:'UTA',MAMMOTH:'UTA',
    EDMONTONOILERS:'EDM',OILERS:'EDM',ANAHEIMDUCKS:'ANA',DUCKS:'ANA',BOSTONBRUINS:'BOS',BRUINS:'BOS',
    BUFFALOSABRES:'BUF',SABRES:'BUF',MONTREALCANADIENS:'MTL',CANADIENS:'MTL',TAMPABAYLIGHTNING:'TBL',LIGHTNING:'TBL',
    CAROLINAHURRICANES:'CAR',HURRICANES:'CAR',OTTAWASENATORS:'OTT',SENATORS:'OTT',PITTSBURGHPENGUINS:'PIT',PENGUINS:'PIT',
    PHILADELPHIAFLYERS:'PHI',FLYERS:'PHI',LOSANGELESKINGS:'LAK',KINGS:'LAK'
  };
  return nameMap[s]||'';
}
function readRoundOddsObj(obj){
  if(!obj||typeof obj!=='object')return null;
  const get=(keys)=>{for(const k of keys){if(obj[k]!==undefined){const p=probabilityNumber(obj[k]);if(p!==null)return p;}}return null;};
  const make2=get(['make2','makeSecond','make2nd','make_2nd_round','make2ndRound','makeRound2','Make 2nd Round']);
  const make3=get(['make3','makeThird','make3rd','make_3rd_round','make3rdRound','makeRound3','Make 3rd Round']);
  const makeFinal=get(['makeFinal','make_final','makeStanleyCupFinal','makeSCF','Make Final']);
  const winCup=get(['winCup','cupOdds','stanleyCupOdds','stanleyCup','cup','Win Cup']);
  if(make2===null&&make3===null&&makeFinal===null&&winCup===null)return null;
  return {make2:Math.max(0,make2??0),make3:Math.max(0,make3??0),makeFinal:Math.max(0,makeFinal??0),winCup:Math.max(0,winCup??0)};
}
function normalizeRoundOdds(data){
  const out={};
  const add=(code,obj)=>{const c=normalizeCode(code);const odds=readRoundOddsObj(obj);if(c&&odds)out[c]=odds;};
  if(data&&data.teams&&typeof data.teams==='object'&&!Array.isArray(data.teams))Object.entries(data.teams).forEach(([code,obj])=>add(code,obj));
  const rows=Array.isArray(data)?data:(Array.isArray(data?.teams)?data.teams:[]);
  rows.forEach(row=>{const code=row.team||row.code||row.abbrev||row.abbreviation||row.name||row.teamName;add(code,row);});
  return Object.keys(out).length?out:JSON.parse(JSON.stringify(FALLBACK_ROUND_ODDS));
}
async function fetchPoolOdds(){
  const cacheBust='?cb='+Date.now();
  const repoBase=location.pathname.replace(/\/[^/]*$/, '/');
  const urls=['./odds.json'+cacheBust, repoBase+'odds.json'+cacheBust];
  let lastErr=null;
  for(const url of urls){
    try{
      const r=await fetch(url,{cache:'no-store'});
      if(!r.ok)throw new Error(url+' HTTP '+r.status);
      const data=await r.json();
      const normalized=normalizeRoundOdds(data);
      oddsError=false;
      return normalized;
    }catch(e){lastErr=e;}
  }
  console.warn('Odds fetch failed, using fallback MoneyPuck odds:',lastErr);
  oddsError=true;
  return JSON.parse(JSON.stringify(FALLBACK_ROUND_ODDS));
}
function teamCode(team){return TEAM_CODE[team]||normalizeCode(team);}
function oddsFor(team,odds){return odds[teamCode(team)]||FALLBACK_ROUND_ODDS[teamCode(team)]||{make2:0.05,make3:0.025,makeFinal:0.01,winCup:0.005};}
function roundWeight(team,roundNum,odds){
  const o=oddsFor(team,odds);
  if(roundNum===1)return Math.max(0.0001,o.make2);
  if(roundNum===2)return Math.max(0.0001,o.make2>0?o.make3/o.make2:o.make3||o.winCup||0.0001);
  if(roundNum===3)return Math.max(0.0001,o.make3>0?o.makeFinal/o.make3:o.makeFinal||o.winCup||0.0001);
  if(roundNum===4)return Math.max(0.0001,o.makeFinal>0?o.winCup/o.makeFinal:o.winCup||0.0001);
  return Math.max(0.0001,o.winCup||0.0001);
}
function existingSeries(a,b,roundNum){return seriesList.find(s=>s.roundNum===roundNum&&seriesKey(s.t1,s.t2)===seriesKey(a,b))||null;}
function matchupWinner(a,b,roundNum,odds){
  if(!a)return b;if(!b)return a;
  const existing=existingSeries(a,b,roundNum);
  if(existing&&existing.winner)return existing.winner;
  const wa=roundWeight(a,roundNum,odds), wb=roundWeight(b,roundNum,odds);
  return Math.random()<wa/(wa+wb)?a:b;
}
function simulateBracket(odds){
  const r1Pairs=[['Colorado','LA Kings'],['Dallas','Minnesota'],['Vegas','Utah'],['Edmonton','Anaheim'],['Boston','Buffalo'],['Montreal','Tampa Bay'],['Carolina','Ottawa'],['Pittsburgh','Philadelphia']];
  const r1=r1Pairs.map(([a,b])=>matchupWinner(a,b,1,odds));
  const r2Pairs=[[r1[0],r1[1]],[r1[2],r1[3]],[r1[4],r1[5]],[r1[6],r1[7]]];
  const r2=r2Pairs.map(([a,b])=>matchupWinner(a,b,2,odds));
  const r3Pairs=[[r2[0],r2[1]],[r2[2],r2[3]]];
  const r3=r3Pairs.map(([a,b])=>matchupWinner(a,b,3,odds));
  const cup=matchupWinner(r3[0],r3[1],4,odds);
  return{r1,r2,r3,cup};
}
function scoreScenario(p,sim){
  let total=0;
  Object.values(p.r1).forEach(pick=>{if(sim.r1.includes(pick))total+=1;});
  p.r2.forEach(pick=>{if(sim.r2.includes(pick))total+=2;});
  p.r3.forEach(pick=>{if(sim.r3.includes(pick))total+=3;});
  if(p.cup===sim.cup)total+=5;
  return total;
}
async function runPoolSim(){
  const odds=await fetchPoolOdds();
  const sims=20000, totals={}, wins={};
  PLAYERS.forEach(p=>{totals[p.name]=0;wins[p.name]=0;});
  for(let i=0;i<sims;i++){
    const sim=simulateBracket(odds);
    const scores=PLAYERS.map(p=>({name:p.name,score:scoreScenario(p,sim)}));
    scores.forEach(s=>totals[s.name]+=s.score);
    const best=Math.max(...scores.map(s=>s.score));
    const tied=scores.filter(s=>s.score===best);
    tied.forEach(s=>wins[s.name]+=1/tied.length);
  }
  poolProjection=PLAYERS.map(p=>({name:p.name,cup:p.cup,winPct:wins[p.name]/sims*100,expPts:totals[p.name]/sims})).sort((a,b)=>b.winPct-a.winPct || b.expPts-a.expPts);
  renderPoolOdds();
}
function renderPoolOdds(){
  const el=document.getElementById('poolOdds');if(!el)return;
  if(!poolProjection){el.innerHTML='<div style="padding:40px;text-align:center;color:var(--silver)">Loading pool odds...</div>';return;}
  const medals=['🥇','🥈','🥉'],cls=['p1','p2','p3'];
  let html=`<div class="info-banner">📊 Simulates 20,000 playoff outcomes using MoneyPuck round odds from <b>odds.json</b>. It scores every full bracket: R1 = 1, R2 = 2, CF = 3, Cup = 5. ${oddsError?'Using fallback odds because odds.json could not be read.':'Odds loaded from your hourly GitHub Action file.'}</div>`;
  html+='<div class="section-title">Chance to Win the Pool</div>';
  poolProjection.forEach((p,i)=>{
    html+=`<div class="odds-card ${cls[i]||''}"><div style="flex:1"><div class="odds-name">${medals[i]||(i+1)} ${displayPlayerName(p.name)}</div><div class="score-breakdown"><span class="score-pill">Expected: ${p.expPts.toFixed(1)} pts</span><span class="cup-pick">🏒 ${p.cup}</span></div><div class="odds-bar"><div class="odds-fill" style="width:${Math.min(100,p.winPct).toFixed(1)}%"></div></div></div><div><div class="odds-percent">${p.winPct.toFixed(1)}%</div><div class="odds-sub">to win</div></div></div>`;
  });
  el.innerHTML=html;
}

function setSyncStatus(s){const dot=document.getElementById('syncDot'),lbl=document.getElementById('syncStatus');dot.className='sync-dot';if(s==='live'){dot.classList.add('live');lbl.textContent='Live';}else if(s==='loading'){dot.classList.add('loading');lbl.textContent='Fetching NHL results...';}else{dot.classList.add('error');lbl.textContent='API error — retrying';}}
function showTab(id,el){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById(id).classList.add('active');el.classList.add('active');}
async function init(){
  await fetchBracket();
  await runPoolSim();
}
init();
setInterval(async()=>{
  await fetchBracket();
  await runPoolSim();
},5*60*1000);
