name: Update Odds Hourly

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install deps
        run: pip install beautifulsoup4 requests

      - name: Scrape MoneyPuck
        run: |
          python <<EOF
          import requests, json
          from bs4 import BeautifulSoup

          url = "https://moneypuck.com/predictions.htm"
          html = requests.get(url).text
          soup = BeautifulSoup(html, "html.parser")

          teams = {}

          rows = soup.select("table tr")

          for row in rows:
              cols = [c.text.strip() for c in row.find_all("td")]
              if len(cols) >= 5:
                  team = cols[0]
                  try:
                      teams[team] = {
                          "make2": float(cols[1].replace('%',''))/100,
                          "make3": float(cols[2].replace('%',''))/100,
                          "makeFinal": float(cols[3].replace('%',''))/100,
                          "winCup": float(cols[4].replace('%',''))/100
                      }
                  except:
                      pass

          data = {
              "updatedAt": __import__("datetime").datetime.utcnow().isoformat(),
              "teams": teams
          }

          with open("odds.json","w") as f:
              json.dump(data,f,indent=2)
          EOF

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add odds.json
          git commit -m "Update odds" || echo "No changes"
          git push
