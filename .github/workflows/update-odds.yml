name: Update Odds Hourly

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Fetch odds
        run: |
          curl -o odds.json https://api.allorigins.win/raw?url=https://moneypuck.com/moneypuck/odds.json

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add odds.json
          git commit -m "Update odds" || echo "No changes"
          git push
